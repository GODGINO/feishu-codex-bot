appId: com.sigma.terminal
productName: Sigma Terminal
directories:
  output: release
  buildResources: assets
files:
  - dist/**/*
  - src/renderer/**/*
  - assets/**/*
  - "!src/main/**/*"
mac:
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  target:
    - dmg
    - zip
dmg:
  title: Sigma Terminal
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
win:
  icon: assets/icon.ico
  target:
    - dir
nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
  shortcutName: Sigma Terminal
